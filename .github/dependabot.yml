version: 2

updates:
  - package-ecosystem: "bun"
    directories:
      - "/"
      - "/config"
      - "/dagger/bun"
      - "/dagger/cloudflare"
      - "/dagger/deno"
      - "/dagger/github"
      - "/dagger/gitlab"
      - "/dagger/nodejs"
      - "/dagger/onepassword"
      - "/dagger/restate"
      - "/dagger/sops"
      - "/dagger/sqld"
      - "/dagger/sqld/tests"
      - "/dagger/wundergraph"
      - "/infrastructure/cloud.rawkode.tfstate/cloudflare-worker"
      - "/infrastructure/cloud.rawkode.tfstate/infrastructure"
      - "/infrastructure/dns"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directories:
      - "/dagger/terraform-cdk/dagger"
      - "/presentations/cloud-native-2.0"
      - "/presentations/cloud-native-2.0/demo/set_url"
      - "/presentations/lets-meet-cdktf-python"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      security:
        applies-to: "security-updates"
        patterns:
          - "*"

  - package-ecosystem: "gomod"
