    name: rawkode-academy-studio-pullRequest
    runs-on: namespace-profile-linux-x86
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Cache /nix on Namespace volume
