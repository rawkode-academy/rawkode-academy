name: rocko
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/rocko.yml
      - projects/rocko/**
  workflow_dispatch: {}
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  build-image:
    name: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Rocko
        uses: docker/build-push-action@v6
        with:
          context: ./projects/rocko
          push: true
          tags: |
            ghcr.io/rawkode-academy/rocko:latest
            ghcr.io/rawkode-academy/rocko:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push software-developer
        uses: docker/build-push-action@v6
        with:
          context: ./projects/rocko/software-developer
          push: true
          tags: |
            ghcr.io/rawkode-academy/rocko-software-developer:latest
            ghcr.io/rawkode-academy/rocko-software-developer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-gitops:
    name: publish-gitops-oci
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pin deployment images to SHA tag
        run: |
          sed -i 's|ghcr.io/rawkode-academy/rocko:latest|ghcr.io/rawkode-academy/rocko:${{ github.sha }}|' \
            ./projects/rocko/gitops/deployment.yaml
          sed -i 's|ghcr.io/rawkode-academy/rocko-software-developer:latest|ghcr.io/rawkode-academy/rocko-software-developer:${{ github.sha }}|' \
            ./projects/rocko/gitops/software-developer-deployment.yaml

      - name: Install Flux CLI
        run: curl -s https://fluxcd.io/install.sh | sudo bash

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push GitOps OCI artifact
        run: |
          flux push artifact oci://ghcr.io/rawkode-academy/rocko/gitops:${{ github.sha }} \
            --path="./projects/rocko/gitops" \
            --source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --revision="${GITHUB_REF_NAME}@sha1:${GITHUB_SHA}"
          flux tag artifact oci://ghcr.io/rawkode-academy/rocko/gitops:${{ github.sha }} \
            --tag=latest
