# Generated by cuenv - do not edit manually
# Regenerate with: cuenv sync ci

name: klustered-live-pullRequest
on:
  pull_request:
    paths:
    - .github/workflows/klustered-live-pullrequest.yml
    - cue.mod/**
    - projects/klustered.live/astro.config.mjs
    - projects/klustered.live/astro.config.mjs/**
    - projects/klustered.live/env.cue
    - projects/klustered.live/package.json
    - projects/klustered.live/package.json/**
    - projects/klustered.live/public/**
    - projects/klustered.live/schema/**
    - projects/klustered.live/src/**
    - projects/klustered.live/wrangler.jsonc
    - projects/klustered.live/wrangler.jsonc/**
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write
jobs:
  klustered-live-pullRequest:
    name: klustered-live-pullRequest
    runs-on: namespace-profile-linux-x86
    environment: production
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Cache /nix on Namespace volume
      uses: namespacelabs/nscloud-cache-action@v1
      with:
        cache: nix
    - name: Prepare Determinate receipt
      run: |-
        if [ -e /nix/receipt.json ]; then
          if command -v sudo >/dev/null 2>&1; then
            sudo rm -f /nix/receipt.json
          else
            rm -f /nix/receipt.json
          fi
        fi
    - name: Install Determinate Nix
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: accept-flake-config = true
    - name: Prune Determinate Nix receipt
      run: |-
        if [ -e /nix/receipt.json ]; then
          if command -v sudo >/dev/null 2>&1; then
            sudo rm -f /nix/receipt.json
          else
            rm -f /nix/receipt.json
          fi
        fi
    - name: cuenv:contributor:bun.workspace.setup
      run: 'true'
    - name: Setup cuenv (release)
      run: |-
        arch="$(uname -m)"
        case "$arch" in
          x86_64|amd64) cuenv_asset="cuenv-linux-x64" ;;
          aarch64|arm64) cuenv_asset="cuenv-linux-arm64" ;;
          *) echo "Unsupported Linux architecture: $arch" >&2; exit 1 ;;
        esac
        curl -sSL -o /usr/local/bin/cuenv "https://github.com/cuenv/cuenv/releases/latest/download/${cuenv_asset}" && chmod +x /usr/local/bin/cuenv && /usr/local/bin/cuenv sync -A
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Install Bun dependencies
      run: cuenv exec -- bun install --frozen-lockfile
    - name: Setup 1Password
      run: cuenv exec -- cuenv secrets setup onepassword
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    - name: 'Run pipeline: pullRequest'
      run: cuenv ci --pipeline pullRequest --path projects/klustered.live
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_REF_TYPE: ${{ github.ref_type }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        CUENV_ENVIRONMENT: production
        OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
