name: rawkode-academy-website-cwv-monitor

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cwv-monitor:
    name: cwv-monitor
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16
        with:
          extra-conf: accept-flake-config = true

      - name: Run CWV guardrail checks
        run: nix shell nixpkgs#deno -c deno task --cwd projects/rawkode.academy/website check:cwv
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
