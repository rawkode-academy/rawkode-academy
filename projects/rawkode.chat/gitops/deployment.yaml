apiVersion: apps/v1
kind: Deployment
metadata:
  name: rawkode-chat
  namespace: rawkode-chat
  labels:
    app.kubernetes.io/name: rawkode-chat
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rawkode-chat
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rawkode-chat
    spec:
      securityContext:
        fsGroup: 1000
      terminationGracePeriodSeconds: 35
      containers:
        - name: waddle-server
          image: ghcr.io/waddle-social/waddle:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
            - name: xmpp-c2s
              containerPort: 5222
          envFrom:
            - configMapRef:
                name: rawkode-chat
            - secretRef:
                name: rawkode-chat
          volumeMounts:
            - name: data
              mountPath: /var/lib/waddle
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rawkode-chat-data
