apiVersion: apps/v1
kind: Deployment
metadata:
  name: software-developer
  namespace: rocko
  labels:
    app.kubernetes.io/name: software-developer
    app.kubernetes.io/part-of: rocko
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: software-developer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: software-developer
        app.kubernetes.io/part-of: rocko
    spec:
      serviceAccountName: software-developer
      containers:
        - name: software-developer
          image: ghcr.io/rawkode-academy/rocko-software-developer:latest
          env:
            - name: ZOT_REGISTRY
              value: "zot.zot.svc.cluster.local:5000"
            - name: APPS_NAMESPACE
              value: "apps"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: software-developer-workspace
