apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: software-developer
  namespace: rocko
spec:
  description: "Software developer agent - builds new software and modifies, fixes, debugs, and deploys existing software using bash, Nix, and kubectl"
  type: BYO
  byo:
    deployment:
      image: ghcr.io/rawkode-academy/rocko-software-developer:latest
      serviceAccountName: software-developer
      podSecurityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
        supplementalGroups:
          - 1001
      securityContext:
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001
      env:
        - name: ZOT_REGISTRY
          value: "zot.zot.svc.cluster.local:5000"
        - name: DEPLOY_NAMESPACE
          value: "apps"
        - name: DEPLOY_RUNTIME_IMAGE
          value: "ghcr.io/rawkode-academy/rocko-software-developer:latest"
        - name: WORKSPACE_DIR
          value: "/workspace"
        - name: NIX_CONFIG
          value: "experimental-features = nix-command flakes"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: rocko
              key: OPENAI_API_KEY
        - name: OPENAI_MODEL
          value: "gpt-5.4"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: software-developer-workspace
