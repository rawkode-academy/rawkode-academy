apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: software-developer
  namespace: rocko
spec:
  description: "Software developer agent - generates, builds, and deploys TypeScript web applications"
  type: BYO
  byo:
    deployment:
      image: ghcr.io/rawkode-academy/rocko-software-developer:latest
      env:
        - name: ZOT_REGISTRY
          value: "zot.zot.svc.cluster.local:5000"
        - name: DEPLOY_NAMESPACE
          value: "apps"
        - name: WORKSPACE_DIR
          value: "/workspace"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: rocko
              key: OPENAI_API_KEY
