apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: code-rawkode-academy
resources:
  - github.com/comtrya/comtrya/opt/kubernetes/base?ref=5258280fb35538ea7f71d3a698e4dbe7f6e017d0
  - namespace.yaml
  - external-secret.yaml
  - httproute.yaml

images:
  - name: ghcr.io/comtrya/comtrya-server
    digest: sha256:28df9e72cf51619f7aa54bc264e2e387f8b17c23ee3145229c588d8daa15fb07
  - name: ghcr.io/comtrya/comtrya-frontend
    digest: sha256:eca51a880a944ffe36ef73feb868e69711d345a5d36c976cf53e1a1586a5ce7d

patches:
  - patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: comtrya
      $patch: delete
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: comtrya-server-secrets
      $patch: delete
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: comtrya-server-config
      data:
        COMTRYA_CONFIG_REPO_URL: https://codeberg.org/rawkode-academy/comtrya
        COMTRYA_CONFIG_REPO_REF: main
        COMTRYA_CONFIG_REPO_PATH: ""
        COMTRYA_CONFIG_REPO_USERNAME: null
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: comtrya-data
      spec:
        storageClassName: openebs-single-replica
        resources:
          requests:
            storage: 20Gi
