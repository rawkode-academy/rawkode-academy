apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: code-rawkode-academy
resources:
  - github.com/comtrya/comtrya/opt/kubernetes/base?ref=ff87077a2af0d7b92095ab21ab74c964d2c842c2
  - namespace.yaml
  - external-secret.yaml
  - httproute.yaml

images:
  - name: ghcr.io/comtrya/comtrya-server
    digest: sha256:8072ca85663387ad94507667581cd4d0e48bb7fbfe8cc161f14de6b5bb07ff3a
  - name: ghcr.io/comtrya/comtrya-frontend
    digest: sha256:d933dd17ec72a342b057bed7a27bfe8c35fb8d6276f503e24c1601e82202c4c0

patches:
  - patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: comtrya
      $patch: delete
  - patch: |-
      apiVersion: v1
      kind: Secret
      metadata:
        name: comtrya-server-secrets
      $patch: delete
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: comtrya-server-config
      data:
        COMTRYA_CONFIG_REPO_URL: https://codeberg.org/rawkode-academy/comtrya
        COMTRYA_CONFIG_REPO_REF: main
        COMTRYA_CONFIG_REPO_PATH: ""
        COMTRYA_CONFIG_REPO_USERNAME: null
  - patch: |-
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: comtrya-data
      spec:
        storageClassName: openebs-single-replica
        resources:
          requests:
            storage: 20Gi
