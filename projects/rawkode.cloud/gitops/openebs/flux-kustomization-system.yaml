apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs-system
  namespace: flux-system
spec:
  interval: 5m
  path: ./openebs/system
  prune: true
  timeout: 10m
  wait: true
  sourceRef:
    kind: OCIRepository
    name: rawkode-cloud-gitops
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: openebs
      namespace: flux-system
