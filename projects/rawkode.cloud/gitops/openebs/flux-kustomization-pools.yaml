apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openebs-pools
  namespace: flux-system
spec:
  dependsOn:
    - name: openebs-system
  interval: 5m
  path: ./openebs/pools
  prune: true
  timeout: 10m
  wait: true
  sourceRef:
    kind: OCIRepository
    name: rawkode-cloud-gitops
