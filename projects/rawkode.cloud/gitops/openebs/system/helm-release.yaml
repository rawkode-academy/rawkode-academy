apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openebs
  namespace: flux-system
spec:
  interval: 30m
  releaseName: openebs
  targetNamespace: openebs
  chart:
    spec:
      chart: openebs
      interval: 1h
      sourceRef:
        kind: HelmRepository
        name: openebs
        namespace: flux-system
      version: "4.4.0"
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    engines:
      local:
        lvm:
          enabled: false
        zfs:
          enabled: false
        rawfile:
          enabled: false
      replicated:
        mayastor:
          enabled: true
    mayastor:
      etcd:
        replicaCount: 2
      nats:
        cluster:
          replicas: 2
      storageClass:
        enabled: true
        default: true
        nameSuffix: single-replica
        parameters:
          protocol: nvmf
          repl: 1
    loki:
      enabled: false
    alloy:
      enabled: false
