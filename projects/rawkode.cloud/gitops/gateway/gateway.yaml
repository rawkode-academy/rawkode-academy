apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rawkode-cloud
  namespace: gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.rawkode.cloud"
      tls:
        mode: Terminate
        certificateRefs:
          - name: rawkode-cloud-tls
