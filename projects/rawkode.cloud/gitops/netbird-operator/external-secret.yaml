apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbird-mgmt-api-key
  namespace: netbird
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: netbird-mgmt-api-key
    creationPolicy: Owner
  data:
    - secretKey: NB_API_KEY
      remoteRef:
        key: /projects/rawkode-cloud/NETBIRD_KUBERNETES_TOKEN
