apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: your-app-secrets
  namespace: your-app-namespace
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 60
  authentication:
    kubernetesAuth:
      identityId: replace-with-machine-identity-id
      serviceAccountRef:
        name: infisical-workload
        namespace: your-app-namespace
        audiences:
          - https://kubernetes.default.svc.cluster.local
        autoCreateServiceAccountToken: true
      secretsScope:
        projectSlug: replace-with-project-slug
        envSlug: replace-with-env-slug
        secretsPath: replace-with-secrets-path
  managedKubeSecretReferences:
    - secretName: app-secrets
      secretNamespace: your-app-namespace
      creationPolicy: Owner
      template:
        includeAllSecrets: true
        secretType: Opaque
