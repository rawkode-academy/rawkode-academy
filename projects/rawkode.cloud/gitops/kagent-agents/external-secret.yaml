apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-slack-credentials
  namespace: kagent
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: kagent-slack-credentials
    creationPolicy: Owner
  data:
    - secretKey: SLACK_BOT_TOKEN
      remoteRef:
        key: SLACK_BOT_TOKEN
    - secretKey: SLACK_TEAM_ID
      remoteRef:
        key: SLACK_TEAM_ID
    - secretKey: SLACK_CHANNEL_IDS
      remoteRef:
        key: SLACK_CHANNEL_IDS
