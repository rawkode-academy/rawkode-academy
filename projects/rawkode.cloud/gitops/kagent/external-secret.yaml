apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-openai
  namespace: flux-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: kagent-openai
    creationPolicy: Owner
  data:
    - secretKey: apiKey
      remoteRef:
        key: OPENAI_API_KEY
