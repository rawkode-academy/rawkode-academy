apiVersion: v1
kind: Namespace
metadata:
  name: your-app-namespace
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infisical-workload
  namespace: your-app-namespace
---
apiVersion: v1
kind: Pod
metadata:
  name: infisical-csi-smoke-test
  namespace: your-app-namespace
spec:
  serviceAccountName: infisical-workload
  restartPolicy: Never
  containers:
    - name: shell
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
        - ls -la /mnt/secrets-store && sleep 3600
      volumeMounts:
        - name: secrets-store-inline
          mountPath: /mnt/secrets-store
          readOnly: true
  volumes:
    - name: secrets-store-inline
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: infisical
