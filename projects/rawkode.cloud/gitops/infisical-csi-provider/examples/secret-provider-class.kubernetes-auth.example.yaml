apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: infisical
  namespace: your-app-namespace
spec:
  provider: infisical
  secretObjects:
    - secretName: app-secrets
      type: Opaque
      data:
        - objectName: db-password
          key: DB_PASSWORD
  parameters:
    infisicalUrl: https://app.infisical.com
    authMethod: kubernetes
    identityId: replace-with-machine-identity-id
    projectId: replace-with-project-id
    envSlug: replace-with-env-slug
    secrets: |
      - secretPath: replace-with-secrets-path
        fileName: db-password
        secretKey: DB_PASSWORD
    # Enable this only on platforms that require the default Kubernetes audience.
    # useDefaultAudience: "true"
