apiVersion: resources.teleport.dev/v1
kind: TeleportRoleV8
metadata:
  name: academy-viewer
  namespace: teleport
spec:
  allow:
    kubernetes_groups:
      - teleport-viewers
    kubernetes_labels:
      "*": "*"
    kubernetes_resources:
      - kind: "*"
        namespace: "*"
        name: "*"
        api_group: "*"
        verbs:
          - get
          - list
          - watch
