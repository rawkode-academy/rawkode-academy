apiVersion: resources.teleport.dev/v1
kind: TeleportRoleV8
metadata:
  name: academy-admin
  namespace: teleport
spec:
  allow:
    kubernetes_groups:
      - system:masters
    kubernetes_labels:
      "*": "*"
    kubernetes_resources:
      - kind: "*"
        namespace: "*"
        name: "*"
        api_group: "*"
        verbs:
          - "*"
