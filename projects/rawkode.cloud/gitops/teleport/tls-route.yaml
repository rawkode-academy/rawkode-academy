apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: teleport
  namespace: teleport
spec:
  parentRefs:
    - name: rawkode-cloud
      namespace: gateway
      sectionName: teleport-passthrough
    - name: rawkode-cloud
      namespace: gateway
      sectionName: teleport-grpc-passthrough
    - name: rawkode-cloud
      namespace: gateway
      sectionName: teleport-kube-passthrough
  rules:
    - backendRefs:
        - name: teleport
          port: 443
